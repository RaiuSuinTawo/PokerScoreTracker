#
# HoldemAccount · Docker Compose（本地开发 / 自有服务器部署）
#
# 用法（仓库根）：
#   1. cp server/.env.example server/.env 并填写 JWT 密钥等
#   2. cd deploy && docker compose up -d --build
#   3. 等 MySQL 就绪后：docker compose exec holdem npx prisma migrate deploy
#   4. Seed 管理员：docker compose exec holdem npx tsx prisma/seed.ts
#
# 微信云托管用户无需使用此文件——平台提供 MySQL 并自动构建/部署容器。
#

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: holdem_root_pw
      MYSQL_DATABASE: holdem
      MYSQL_USER: holdem
      MYSQL_PASSWORD: holdem_pass
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "holdem", "-pholdem_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  holdem:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: holdem-server:latest
    restart: unless-stopped
    env_file:
      - ../server/.env
    environment:
      - DATABASE_URL=mysql://holdem:holdem_pass@mysql:3306/holdem
      - HOST=0.0.0.0
      - PORT=3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql-data:
